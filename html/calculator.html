<!-- Property Investment Calculator -->
<section id="calculator" class="calc-section">
    <div class="container">
        <span class="eyebrow">Financial Planning</span>
        <h2>Investment Estimator</h2>
        <div class="calc-box">
            <div class="input-group">
                <label for="propAmount">Property Value (₹ Cr)</label>
                <input type="number" id="propAmount" value="25" min="1" step="0.1">
            </div>
            <div class="input-group">
                <label for="downPayment">Down Payment (%)</label>
                <input type="number" id="downPayment" value="20" min="0" max="100">
            </div>
            <button onclick="calculateInvestment()" class="btn btn-gold">Calculate Outlay</button>
            <div id="calcResult" style="display: none;">
                <h4>Estimated Loan: ₹ <span id="loanAmt">0</span> Cr</h4>
                <p class="calc-note">*Subject to bank approval and current interest rates.</p>
            </div>
        </div>
    </div>
</section>
